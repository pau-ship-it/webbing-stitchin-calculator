<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Puños</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #141414;
  --bg2:    #1e1e1e;
  --bg3:    #272727;
  --bg4:    #303030;
  --line:   rgba(255,255,255,0.08);
  --line2:  rgba(255,255,255,0.04);
  --txt:    #f0ede6;
  --txt2:   #b8b4ae;
  --txt3:   #7a7672;
  --ok:     #5cb85c;
  --ok-bg:  rgba(92,184,92,0.13);
  --ok-bdr: rgba(92,184,92,0.35);
  --warn:   #e0b040;
  --warn-bg:rgba(224,176,64,0.11);
  --warn-bdr:rgba(224,176,64,0.35);
  --bad:    #e06060;
  --bad-bg: rgba(224,96,96,0.11);
  --bad-bdr:rgba(224,96,96,0.35);
  --r: 5px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--txt); font-size: 14px; line-height: 1.5; min-height: 100vh; }

header {
  border-bottom: 1px solid var(--line); padding: 18px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
header h1 { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.header-sub { font-family: var(--mono); font-size: 11px; color: var(--txt2); }

.layout { display: grid; grid-template-columns: 190px 1fr; min-height: calc(100vh - 53px); }

aside {
  border-right: 1px solid var(--line); padding: 20px 0;
  position: sticky; top: 0; height: calc(100vh - 53px); overflow-y: auto;
}
.nav-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--txt2); padding: 0 16px; margin-bottom: 8px; }
.nav-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 9px 16px; border: none; background: transparent;
  cursor: pointer; font-family: var(--sans); font-size: 13px; color: var(--txt2);
  text-align: left; transition: background .1s, color .1s;
}
.nav-btn:hover { background: var(--bg2); color: var(--txt); }
.nav-btn.active { background: var(--bg3); color: var(--txt); }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg4); flex-shrink: 0; transition: background .2s; }
.nav-dot.ok     { background: var(--ok); }
.nav-dot.warn   { background: var(--warn); }
.nav-dot.danger { background: var(--bad); }

.content { padding: 28px 32px; }
.corner-panel { display: none; }
.corner-panel.active { display: block; }
.panel-title { font-family: var(--mono); font-size: 20px; font-weight: 500; margin-bottom: 28px; }

.fsection { margin-bottom: 24px; }
.flabel { font-family: var(--mono); font-size: 10px; letter-spacing: .09em; text-transform: uppercase; color: var(--txt2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--line2); }
.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fg3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--txt2); font-family: var(--mono); }
.field input, .field select {
  background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r);
  padding: 8px 10px; font-family: var(--mono); font-size: 13px; color: var(--txt);
  width: 100%; -webkit-appearance: none; appearance: none; transition: border-color .12s;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--txt3); }
.field input[type=number] { text-align: right; }

.side-block { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); padding: 14px; margin-top: 10px; }
.side-block-label { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--txt2); margin-bottom: 10px; }

.result-box { margin-top: 28px; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
.result-head { background: var(--bg3); padding: 9px 16px; font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--txt3); }
.result-body { padding: 20px; }
.result-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.rlabel { font-family: var(--mono); font-size: 11px; color: var(--txt2); margin-bottom: 4px; }
.rvalue { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; }
.rvalue-sm { font-family: var(--mono); font-size: 20px; font-weight: 500; line-height: 1; }
.rsub { font-family: var(--mono); font-size: 11px; color: var(--txt2); margin-top: 3px; }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-lbl { font-family: var(--mono); font-size: 11px; color: var(--txt2); min-width: 200px; }
.bar-track { flex: 1; height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.bar-val { font-family: var(--mono); font-size: 12px; font-weight: 500; min-width: 85px; text-align: right; }

.ratio-row { display: flex; align-items: center; gap: 10px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line2); }
.ratio-lbl { font-family: var(--mono); font-size: 11px; color: var(--txt2); white-space: nowrap; }
.ratio-track { flex: 1; height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
.ratio-fill { height: 100%; border-radius: 3px; transition: width .3s, background .3s; }
.ratio-pct { font-family: var(--mono); font-size: 13px; font-weight: 500; min-width: 38px; text-align: right; }

.status-pill { display: inline-block; font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 3px; margin-top: 14px; }
.pill-ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok-bdr); }
.pill-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-bdr); }
.pill-bad  { background: var(--bad-bg);  color: var(--bad);  border: 1px solid var(--bad-bdr); }

.summary-wrap { border-top: 1px solid var(--line); padding: 28px 32px; }
.summary-title { font-family: var(--mono); font-size: 12px; color: var(--txt2); margin-bottom: 16px; letter-spacing: .03em; }
.sum-table { width: 100%; border-collapse: collapse; }
.sum-table th { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--txt2); text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--line); font-weight: 400; }
.sum-table td { padding: 10px 12px; border-bottom: 1px solid var(--line2); font-family: var(--mono); font-size: 12px; vertical-align: middle; }
.sum-table tr:last-child td { border-bottom: none; }
.sum-table tr:hover td { background: var(--bg2); }
.sdot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 7px; vertical-align: middle; }
.sdot.ok     { background: var(--ok); }
.sdot.warn   { background: var(--warn); }
.sdot.danger { background: var(--bad); }

footer { border-top: 1px solid var(--line); padding: 14px 28px; font-family: var(--mono); font-size: 10px; color: var(--txt3); letter-spacing: .05em; }

@media (max-width: 680px) {
  .layout { grid-template-columns: 1fr; }
  aside { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; padding: 10px 12px; gap: 4px; }
  .nav-label { display: none; }
  .nav-btn { width: auto; padding: 6px 14px; border-radius: 20px; font-size: 12px; }
  .nav-btn.active { background: var(--bg4); }
  .content, .summary-wrap { padding: 20px 16px; }
  .fg3 { grid-template-columns: 1fr 1fr; }
  .bar-lbl { min-width: 110px; font-size: 10px; }
}
</style>
</head>
<body>

<header>
  <h1>Calculadora de Puños</h1>
  <span class="header-sub">3 líneas × 150 mm = 1.000 kg · punto recto</span>
</header>

<div class="layout">
  <aside>
    <div class="nav-label">Puños</div>
    <div id="cornerNav"></div>
  </aside>

  <div>
    <div class="content" id="cornerContent"></div>

    <div class="summary-wrap">
      <div class="summary-title">Resumen</div>
      <div style="overflow-x:auto">
        <table class="sum-table">
          <thead><tr>
            <th>Puño</th>
            <th>Webbing</th>
            <th>Modo</th>
            <th>Costura</th>
            <th>Costura rompe</th>
            <th>Webbing rompe</th>
            <th>Ratio</th>
            <th>Estado</th>
          </tr></thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
    </div>

    <footer>Webbing Hamidjam &nbsp;·&nbsp; Punto recto &nbsp;·&nbsp; 1 línea × 150 mm = 333 kg</footer>
  </div>
</div>

<script>
const HAM = {
  t:[2.0,4.0,6.0],
  w:[15,20,25,30,40,50,60,80,100,120,220],
  b:{
    2.0:[1.7,2.3,2.8,3.4,4.5,5.5,6.6,8.7,10.8,12.9,23.6],
    4.0:[3.2,4.3,5.3,6.4,8.4,10.5,12.5,16.4,20.4,24.3,44.6],
    6.0:[4.5,6.0,7.5,9.0,11.9,14.7,17.6,23.2,28.8,34.3,62.8]
  }
};
const BASE = 1000/3;

const CORNERS = [
  {id:'tack',  label:'Tack'},
  {id:'clew',  label:'Clew'},
  {id:'head',  label:'Head'},
  {id:'reef1', label:'Rizo 1'},
  {id:'reef2', label:'Rizo 2'},
  {id:'reef3', label:'Rizo 3'}
];

function getBreak(thick, width) {
  const ti = HAM.t.indexOf(parseFloat(thick));
  const wi = HAM.w.indexOf(parseInt(width));
  if (ti<0||wi<0) return null;
  return HAM.b[thick][wi];
}
function stitchKg(lenMm, nLines) { return (lenMm/150)*nLines*BASE; }

function buildNav() {
  const nav = document.getElementById('cornerNav');
  CORNERS.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn'+(i===0?' active':'');
    btn.id = 'nav_'+c.id;
    btn.innerHTML = `<span>${c.label}</span><span class="nav-dot" id="dot_${c.id}"></span>`;
    btn.onclick = () => activate(c.id);
    nav.appendChild(btn);
  });
}

function buildPanels() {
  const wrap = document.getElementById('cornerContent');
  CORNERS.forEach((c,i) => {
    const wOpts = HAM.w.map(w=>`<option value="${w}"${w===50?' selected':''}>${w} mm</option>`).join('');
    const div = document.createElement('div');
    div.className = 'corner-panel'+(i===0?' active':'');
    div.id = 'panel_'+c.id;
    div.innerHTML = `
      <div class="panel-title">${c.label}</div>

      <div class="fsection">
        <div class="flabel">Webbing</div>
        <div class="fg3">
          <div class="field">
            <label>Grosor</label>
            <select id="${c.id}_thick" onchange="recalc()">
              <option value="2.0" selected>2.0 mm</option>
              <option value="4.0">4.0 mm</option>
              <option value="6.0">6.0 mm</option>
            </select>
          </div>
          <div class="field">
            <label>Ancho</label>
            <select id="${c.id}_width" onchange="recalc()">${wOpts}</select>
          </div>
          <div class="field">
            <label>Nº webbings / lado</label>
            <input type="number" id="${c.id}_nweb" value="2" min="1" max="16" oninput="recalc()">
          </div>
        </div>
      </div>

      <div class="fsection">
        <div class="flabel">Costura</div>
        <div class="fg2" style="margin-bottom:12px">
          <div class="field">
            <label>Modo</label>
            <select id="${c.id}_disp" onchange="onDisp('${c.id}')">
              <option value="mirror">Mirror</option>
              <option value="fanned">Fanned</option>
            </select>
          </div>
        </div>

        <div class="side-block">
          <div class="side-block-label" id="${c.id}_slabel">Costura (ambos lados)</div>
          <div class="fg2">
            <div class="field">
              <label>Nº líneas</label>
              <input type="number" id="${c.id}_nls" value="3" min="1" max="30" oninput="recalc()">
            </div>
            <div class="field">
              <label>Longitud (mm)</label>
              <input type="number" id="${c.id}_lens" value="150" min="10" max="5000" oninput="recalc()">
            </div>
          </div>
        </div>

        <div class="side-block" id="${c.id}_pblock" style="display:none">
          <div class="side-block-label">Costura PORT</div>
          <div class="fg2">
            <div class="field">
              <label>Nº líneas</label>
              <input type="number" id="${c.id}_nlp" value="3" min="1" max="30" oninput="recalc()">
            </div>
            <div class="field">
              <label>Longitud (mm)</label>
              <input type="number" id="${c.id}_lenp" value="150" min="10" max="5000" oninput="recalc()">
            </div>
          </div>
        </div>
      </div>

      <div class="result-box" id="${c.id}_result">
        <div class="result-head">Resultado</div>
        <div class="result-body" style="color:var(--txt3);font-family:var(--mono);font-size:12px;padding:16px">—</div>
      </div>`;
    wrap.appendChild(div);
  });
}

function activate(id) {
  CORNERS.forEach(c => {
    document.getElementById('nav_'+c.id).classList.toggle('active', c.id===id);
    document.getElementById('panel_'+c.id).classList.toggle('active', c.id===id);
  });
}

function onDisp(cid) {
  const d = document.getElementById(cid+'_disp').value;
  document.getElementById(cid+'_pblock').style.display = d==='fanned'?'block':'none';
  document.getElementById(cid+'_slabel').textContent = d==='fanned'?'Costura STBD':'Costura (ambos lados)';
  recalc();
}

function calcCorner(cid) {
  const thick = parseFloat(document.getElementById(cid+'_thick').value);
  const width = parseInt(document.getElementById(cid+'_width').value);
  const nweb  = Math.max(1, parseInt(document.getElementById(cid+'_nweb').value)||1);
  const disp  = document.getElementById(cid+'_disp').value;
  const nls   = Math.max(1, parseInt(document.getElementById(cid+'_nls').value)||1);
  const lens  = parseFloat(document.getElementById(cid+'_lens').value)||0;
  const nlp   = disp==='fanned' ? Math.max(1, parseInt(document.getElementById(cid+'_nlp').value)||1) : nls;
  const lenp  = disp==='fanned' ? (parseFloat(document.getElementById(cid+'_lenp').value)||0) : lens;
  const bpw = getBreak(thick, width);
  if (!bpw) return null;
  const webBreak = bpw * nweb * 1000;
  // cada webbing tiene su propio bloque de costura → multiplicar por nweb
  // mirror: 1 bloque por webbing (cubre ambos lados) → nweb × bloque
  // fanned: 1 bloque por lado por webbing → nweb × (STBD + PORT)
  const stS = stitchKg(lens, nls) * nweb;
  const stP = stitchKg(lenp, nlp) * nweb;
  const total = disp==='mirror' ? stS : stS + stP;
  const ratio = Math.round((total/webBreak)*100);
  const status = ratio<85?'ok':ratio<100?'warn':'danger';
  return {thick,width,nweb,disp,nls,lens,stS,nlp,lenp,stP,bpw,webBreak,total,ratio,status};
}

function renderResult(cid, r) {
  const el = document.getElementById(cid+'_result');
  if (!r) return;
  const barC = r.status==='ok'?'#4a9e4a':r.status==='warn'?'#c49a2a':'#c45a5a';
  const pill = r.status==='ok'?'pill-ok':r.status==='warn'?'pill-warn':'pill-bad';
  const stxt = r.status==='ok'?'Fusible correcto — costura cede primero ✓'
    :r.status==='warn'?'Márgenes ajustados — costura cerca del límite ⚠'
    :'Costura más fuerte que webbing — revisar ✗';

  let bars = '';
  if (r.disp==='fanned') {
    const pS = Math.min(100,Math.round((r.stS/r.webBreak)*100));
    const pP = Math.min(100,Math.round((r.stP/r.webBreak)*100));
    bars = `
      <div class="bar-row">
        <div class="bar-lbl">STBD — ${r.nls}L × ${r.lens}mm</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pS}%;background:#4a7ec4"></div></div>
        <div class="bar-val">${Math.round(r.stS).toLocaleString('es-ES')} kg</div>
      </div>
      <div class="bar-row">
        <div class="bar-lbl">PORT — ${r.nlp}L × ${r.lenp}mm</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pP}%;background:#3a8a6a"></div></div>
        <div class="bar-val">${Math.round(r.stP).toLocaleString('es-ES')} kg</div>
      </div>`;
  } else {
    bars = `
      <div class="bar-row">
        <div class="bar-lbl">${r.nls}L × ${r.lens}mm (ambos lados)</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,r.ratio)}%;background:#4a7ec4"></div></div>
        <div class="bar-val">${Math.round(r.total).toLocaleString('es-ES')} kg</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="result-head">Resultado</div>
    <div class="result-body">
      <div class="result-row">
        <div>
          <div class="rlabel">Costura rompe a</div>
          <div class="rvalue">${Math.round(r.total).toLocaleString('es-ES')} kg</div>
          <div class="rsub">${(r.total/1000).toFixed(2)} ton</div>
        </div>
        <div style="text-align:right">
          <div class="rlabel">Webbing rompe a</div>
          <div class="rvalue-sm">${Math.round(r.webBreak).toLocaleString('es-ES')} kg</div>
          <div class="rsub">${r.nweb}× ${r.thick}mm/${r.width}mm · ${r.bpw} t c/u</div>
        </div>
      </div>
      ${bars}
      <div class="ratio-row">
        <span class="ratio-lbl">Costura / Webbing</span>
        <div class="ratio-track"><div class="ratio-fill" style="width:${Math.min(100,r.ratio)}%;background:${barC}"></div></div>
        <span class="ratio-pct">${r.ratio}%</span>
      </div>
      <div><span class="status-pill ${pill}">${stxt}</span></div>
    </div>`;
}

function renderSummary() {
  const tbody = document.getElementById('summaryBody');
  let rows = '';
  CORNERS.forEach(c => {
    const r = calcCorner(c.id);
    if (!r) return;
    const st = r.status==='ok'?'OK ✓':r.status==='warn'?'Ajustado ⚠':'Revisar ✗';
    const cd = r.disp==='mirror'
      ? `${r.nls}L × ${r.lens}mm`
      : `STBD ${r.nls}L×${r.lens}mm / PORT ${r.nlp}L×${r.lenp}mm`;
    rows += `<tr>
      <td style="font-weight:500;color:var(--txt)">${c.label}</td>
      <td>${r.nweb}× ${r.thick}mm/${r.width}mm</td>
      <td>${r.disp}</td>
      <td style="color:var(--txt3);font-size:11px">${cd}</td>
      <td style="font-weight:500;color:var(--txt)">${Math.round(r.total).toLocaleString('es-ES')} kg</td>
      <td>${Math.round(r.webBreak).toLocaleString('es-ES')} kg</td>
      <td>${r.ratio}%</td>
      <td><span class="sdot ${r.status}"></span>${st}</td>
    </tr>`;
  });
  tbody.innerHTML = rows;
}

function updateDot(cid, status) {
  const d = document.getElementById('dot_'+cid);
  if (d) d.className = 'nav-dot '+(status||'');
}

function recalc() {
  CORNERS.forEach(c => {
    const r = calcCorner(c.id);
    renderResult(c.id, r);
    updateDot(c.id, r?r.status:'');
  });
  renderSummary();
}

buildNav();
buildPanels();
recalc();
</script>
</body>
</html>
